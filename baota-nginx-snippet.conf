# ========================================================
# 宝塔 Nginx 配置片段（添加到 wellwin.top 的站点配置中）
# ========================================================
#
# 使用方法：
# 1. 登录宝塔面板 → 网站 → wellwin.top → 配置文件
# 2. 在 server {} 块内，原有 /staticTool/ location 之前，添加以下内容
# 3. 删除旧的 /api-fund/、/api-push2/、/api-qt/、/api-ifzq/ 代理配置
# 4. 保存并重载 Nginx
#
# ========================================================

    # ========== Node.js 后端 API 代理（新增，必须放在 /staticTool/ 之前） ==========
    location ^~ /staticTool/api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ========== 以下删除旧的 4 个代理配置！！！！ ==========
    # 删除 location ^~ /api-fund/ { ... }
    # 删除 location ^~ /api-push2/ { ... }
    # 删除 location ^~ /api-qt/ { ... }
    # 删除 location ^~ /api-ifzq/ { ... }
